<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Echo Maze | 回声迷宫 - 记忆挑战</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">EM</div>
      <div>
        <div class="title">回声迷宫 <span class="muted">Echo Maze</span></div>
        <div class="subtitle">单人玩法：地图周期性消失，只能凭记忆继续走</div>
      </div>
    </div>
    <div class="controls">
      <button id="btnNew">新迷宫</button>
      <button id="btnReset" class="secondary">重开</button>
      <label class="toggle">
        <input id="chkAssist" type="checkbox" />
        <span>调试：永远显示地图</span>
      </label>
    </div>
  </header>

  <main class="grid one">
    <section class="panel" id="panelSolo">
      <div class="panelHeader">
        <h2>记忆挑战模式</h2>
        <div class="badge neutral" id="runnerStatus">READY</div>
      </div>

      <div class="hud">
        <div class="hudItem"><div class="k">时间</div><div class="v"><span id="timeLeft">60</span><span class="unit">s</span></div></div>
        <div class="hudItem"><div class="k">步数</div><div class="v"><span id="steps">0</span><span class="unit">/60</span></div></div>
        <div class="hudItem"><div class="k">视野</div><div class="v"><span id="visMode" class="vis-mode visible">光明期</span></div></div>
        <div class="hudItem"><div class="k">眩晕</div><div class="v" id="stun">0.0s</div></div>
      </div>

      <!-- 音乐控制面板 -->
      <div class="music-controls">
        <div class="music-header">
          <span class="music-label">🎵 背景音乐</span>
          <span class="music-mode" id="musicModeBadge">赛博朋克风格</span>
        </div>
        <div class="music-buttons">
          <button id="btnMusicToggle" class="music-btn" title="播放/暂停">
            <span id="musicIcon">▶️</span>
          </button>
          <button id="btnMusicMute" class="music-btn secondary" title="静音">
            <span id="muteIcon">🔊</span>
          </button>
        </div>
        <div class="volume-control">
          <span class="volume-icon">🔉</span>
          <input type="range" id="volumeSlider" min="0" max="100" value="50" class="volume-slider">
          <span id="volumeValue" class="volume-value">50%</span>
        </div>
        <div class="music-status" id="musicStatus">🎵 点击播放沉浸音景</div>
      </div>

      <div class="canvasWrap">
        <canvas id="gameCanvas" width="520" height="520"></canvas>

        <div class="visBarWrap" aria-label="visibility bar">
          <div class="visBarTrack"><div id="visBar" class="visBar"></div></div>
          <div class="visHint">光明 3s / 黑暗 2s — 黑暗期只能凭记忆移动</div>
        </div>

        <div class="hint">移动：WASD / 方向键　|　R 重开</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="muted">胜利条件：60 秒内、60 步内到达出口。黑暗期撞墙会眩晕。</div>
  </footer>

  <script defer src="music.js"></script>
  <script defer src="memory-game.js"></script>
</body>
</html>
