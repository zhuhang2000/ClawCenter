<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawCenter | Game Prototypes</title>
  <style>
    :root{--bg:#0b0f17;--card:#0f1624;--text:#e8eefc;--muted:#9aa7c2;--line:#22304a;--accent:#79ffa8}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1100px 700px at 10% 10%, #13213a 0%, var(--bg) 55%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,0));color:var(--text)}
    header{max-width:1000px;margin:0 auto;padding:28px 18px 10px}
    h1{margin:0 0 6px;font-size:22px}
    p{margin:0;color:var(--muted)}
    main{max-width:1000px;margin:0 auto;padding:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    a.card{display:block;padding:16px 16px;border-radius:16px;text-decoration:none;color:var(--text);
      border:1px solid rgba(255,255,255,.10); background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    a.card:hover{border-color:rgba(255,255,255,.2)}
    .title{font-weight:900;letter-spacing:.2px}
    .desc{color:var(--muted);margin-top:6px;font-size:13px;line-height:1.5}
    .tag{display:inline-block;margin-top:10px;font-size:12px;color:var(--accent);border:1px solid rgba(121,255,168,.25);background:rgba(121,255,168,.08);padding:6px 10px;border-radius:999px}
    footer{max-width:1000px;margin:0 auto;padding:0 18px 24px;color:var(--muted);font-size:12px}
    code{background:rgba(0,0,0,.25);padding:2px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.08)}
  </style>
</head>
<body>
  <header>
    <h1>Game Prototypes</h1>
    <p>点击即可直接打开试玩（推荐使用 GitHub Pages 部署）。</p>
  </header>
  <main>
    <a class="card" href="auto-coding/echo-maze/">
      <div class="title">回声迷宫 (Echo Maze)</div>
      <div class="desc">合作解谜原型：回声师可见迷宫，探路者隐形探索；回声 3s 延迟、5字限制、移动后 2s 接收冷却、撞墙眩晕。</div>
      <div class="tag">Play</div>
    </a>
  </main>
  <footer>
    本页用于作为仓库根目录入口。若要“点开就玩”，请开启 GitHub Pages（Settings → Pages）并选择分支/目录。
    本地也可用 <code>python -m http.server 8080</code> 访问。
  </footer>
</body>
</html>
